<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 영화관 데이트 신청</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hi+Melody&family=Gaegu:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hi Melody', 'Gaegu', sans-serif;
      background: linear-gradient(135deg, #fce4f3 0%, #f8d7f0 40%, #e8d5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      animation: fadeUp 0.5s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 44px 40px;
      box-shadow: 0 8px 36px rgba(180,80,180,0.18);
      max-width: 500px;
      width: 100%;
    }

    /* step dots */
    .step-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 26px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #e8c8f0; transition: background 0.3s; }
    .dot.active { background: #c060d0; }

    /* emoji */
    .emoji-big {
      font-size: 72px;
      display: block;
      text-align: center;
      margin-bottom: 14px;
      animation: wobble 2s infinite;
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-5deg) scale(1); }
      50%      { transform: rotate(5deg) scale(1.1); }
    }

    h1 {
      font-size: 30px;
      color: #9b3ab5;
      margin-bottom: 10px;
      text-align: center;
      line-height: 1.4;
    }
    p {
      font-size: 17px;
      color: #b060c0;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.6;
    }

    /* buttons */
    .btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .btn {
      font-family: 'Hi Melody', 'Gaegu', sans-serif;
      font-size: 20px;
      padding: 13px 40px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover  { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.13); }
    .btn:active { transform: scale(0.95); }

    .btn-main  { background: linear-gradient(135deg, #c060d0, #8b20b0); color: #fff; }
    .btn-ghost { background: #f5eafa; color: #9b3ab5; border: 2px solid #dbb0ec; }
    .btn-disabled { opacity: 0.38; pointer-events: none; }

    /* no message */
    .no-msg {
      display: none;
      margin-top: 18px;
      font-size: 19px;
      color: #9b3ab5;
      text-align: center;
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    /* ── Calendar ── */
    .cal-header { font-size: 22px; color: #9b3ab5; font-weight: 700; text-align: center; margin-bottom: 14px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 10px; }

    .cal-day-name { font-size: 13px; font-weight: 700; color: #b060c0; text-align: center; padding: 3px 0; }
    .cal-day-name.sun { color: #e04060; }
    .cal-day-name.sat { color: #4060e0; }

    .cal-cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 15px;
      cursor: pointer;
      color: #333;
      transition: background 0.12s, transform 0.12s;
      user-select: none;
      font-family: 'Fredoka', sans-serif;
    }
    .cal-cell:hover:not(.empty) { background: #f0d8fa; transform: scale(1.15); }
    .cal-cell.empty  { pointer-events: none; }
    .cal-cell.sun    { color: #e04060; }
    .cal-cell.sat    { color: #4060e0; }
    .cal-cell.selected { background: linear-gradient(135deg, #c060d0, #8b20b0); color: #fff !important; font-weight: 700; }

    .selected-info { font-size: 17px; color: #9b3ab5; min-height: 24px; text-align: center; margin: 10px 0 16px; }

    /* ── Time selection ── */
    .time-section {
      display: none;
      animation: fadeUp 0.4s ease;
    }
    .time-section.visible { display: block; }

    .time-label { font-size: 18px; color: #9b3ab5; text-align: center; margin-bottom: 12px; }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .time-btn {
      font-family: 'Fredoka', 'Hi Melody', sans-serif;
      font-size: 15px;
      padding: 9px 4px;
      border: 2px solid #dbb0ec;
      border-radius: 14px;
      background: #f9f0fe;
      color: #9b3ab5;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, transform 0.12s;
      user-select: none;
    }
    .time-btn:hover   { background: #f0d8fa; transform: scale(1.07); }
    .time-btn.selected-t { background: linear-gradient(135deg, #c060d0, #8b20b0); color: #fff; border-color: transparent; }

    /* ── Textarea ── */
    textarea {
      font-family: 'Hi Melody', 'Gaegu', sans-serif;
      font-size: 17px;
      width: 100%;
      height: 130px;
      border: 2px solid #dbb0ec;
      border-radius: 16px;
      padding: 14px 16px;
      resize: none;
      outline: none;
      color: #333;
      background: #fdf8ff;
      transition: border 0.2s;
      margin-bottom: 20px;
    }
    textarea:focus  { border-color: #c060d0; }
    textarea::placeholder { color: #d0a0e0; }

    /* ── Complete screen ── */
    .star-row { font-size: 34px; text-align: center; margin-bottom: 14px; letter-spacing: 8px; }
    .summary-box {
      background: #fdf4ff;
      border: 2px dashed #dbb0ec;
      border-radius: 18px;
      padding: 18px 22px;
      text-align: left;
      font-size: 17px;
      color: #7a2090;
      line-height: 1.9;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════ SCREEN 1 ══════════════════════════ -->
<div id="screen1" class="screen active">
  <div class="card">
    <div class="step-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <span class="emoji-big">🎬</span>
    <h1>나랑 영화관<br>데이트 할래?</h1>
    <p>같이 보면 더 재밌을 것 같아서 🍿</p>

    <div class="btn-row">
      <button class="btn btn-main" onclick="goTo('screen2')">✨ Yes!</button>
      <button class="btn btn-ghost" onclick="showNoMsg()">🙅 No..</button>
    </div>
    <div class="no-msg" id="noMsg">🥺 다시 생각해봐.. 응?</div>
  </div>
</div>

<!-- ══════════════════════════ SCREEN 2 ══════════════════════════ -->
<div id="screen2" class="screen">
  <div class="card">
    <div class="step-dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>

    <span class="emoji-big">📅</span>
    <h1>언제가 좋아?</h1>
    <p>날짜랑 시간도 골라줘 🌸</p>

    <div class="cal-header">🍬 2025년 7월 🍬</div>
    <div class="cal-grid" id="calGrid"></div>

    <div class="selected-info" id="selectedInfo">날짜를 먼저 골라줘~</div>

    <!-- 시간 선택 (날짜 고르면 나타남) -->
    <div class="time-section" id="timeSection">
      <div class="time-label">⏰ 몇 시에 만날까?</div>
      <div class="time-grid" id="timeGrid"></div>
    </div>

    <div style="text-align:center;">
      <button class="btn btn-main btn-disabled" id="nextBtn2" onclick="goTo('screen3')">다음으로 →</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════ SCREEN 3 ══════════════════════════ -->
<div id="screen3" class="screen">
  <div class="card">
    <div class="step-dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>

    <span class="emoji-big">✏️</span>
    <h1>뭐 하고 싶어?</h1>
    <p>영화 말고 더 하고 싶은 것도<br>뭐든지 적어줘 🥰</p>

    <textarea id="wishInput" placeholder="예) 분식 먹고 싶어요 🍢  카페도 가고 싶어요 ☕  산책도 해요 🌸"></textarea>

    <div style="text-align:center;">
      <button class="btn btn-main" onclick="submitAll()">완성! 📬</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════ SCREEN 4 ══════════════════════════ -->
<div id="screen4" class="screen">
  <div class="card">
    <div class="star-row">🎊 ✨ 🎊</div>
    <span class="emoji-big" style="animation:none;">🎉</span>
    <h1>신청 완료!</h1>

    <div class="summary-box" id="summaryBox"></div>

    <p style="font-size:15px; color:#b060c0; margin-bottom:0;">기다리고 있을게 🌟</p>
  </div>
</div>

<script>
  let selectedDay  = null;
  let selectedTime = null;

  /* ── Screen nav ── */
  function goTo(id) {
    if (id === 'screen2') buildCalendar();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ── Screen 1 ── */
  function showNoMsg() {
    const m = document.getElementById('noMsg');
    m.style.display = 'block';
    m.style.animation = 'none';
    void m.offsetWidth;
    m.style.animation = 'shake 0.4s';
  }

  /* ── Calendar ── */
  function buildCalendar() {
    if (document.getElementById('calGrid').children.length) return;
    const grid = document.getElementById('calGrid');
    ['일','월','화','수','목','금','토'].forEach((n, i) => {
      const el = document.createElement('div');
      el.className = 'cal-day-name' + (i===0?' sun': i===6?' sat':'');
      el.textContent = n;
      grid.appendChild(el);
    });

    const startDay = 2; // July 2025 starts on Tuesday
    for (let i = 0; i < startDay; i++) {
      const b = document.createElement('div');
      b.className = 'cal-cell empty';
      grid.appendChild(b);
    }
    for (let d = 1; d <= 31; d++) {
      const cell = document.createElement('div');
      const dow = (startDay + d - 1) % 7;
      cell.className = 'cal-cell' + (dow===0?' sun': dow===6?' sat':'');
      cell.textContent = d;
      cell.addEventListener('click', () => selectDay(d, cell, dow));
      grid.appendChild(cell);
    }
  }

  const dowNames = ['일','월','화','수','목','금','토'];

  function selectDay(d, cell, dow) {
    document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
    cell.classList.add('selected');
    selectedDay  = d;
    selectedTime = null;

    document.getElementById('selectedInfo').textContent = `✅ 7월 ${d}일 (${dowNames[dow]}) 선택됨`;

    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected-t'));
    document.getElementById('timeSection').classList.add('visible');
    updateNextBtn();

    if (!document.getElementById('timeGrid').children.length) buildTimeGrid();
  }

  function buildTimeGrid() {
    const times = ['10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];
    const grid = document.getElementById('timeGrid');
    times.forEach(t => {
      const btn = document.createElement('div');
      btn.className = 'time-btn';
      btn.textContent = t;
      btn.addEventListener('click', () => selectTime(t, btn));
      grid.appendChild(btn);
    });
  }

  function selectTime(t, btn) {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected-t'));
    btn.classList.add('selected-t');
    selectedTime = t;

    const startDay = 2;
    const dow = dowNames[(startDay + selectedDay - 1) % 7];
    document.getElementById('selectedInfo').textContent = `✅ 7월 ${selectedDay}일 (${dow}) ${t}`;
    updateNextBtn();
  }

  function updateNextBtn() {
    const btn = document.getElementById('nextBtn2');
    if (selectedDay && selectedTime) {
      btn.classList.remove('btn-disabled');
    } else {
      btn.classList.add('btn-disabled');
    }
  }

  /* ── Submit ── */
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzV59-NXMvbFInmKrPNQFs1pGWj20ZPU3uybz9Mk1BOpUEY7l94cQGD1ogNJjraMgoC/exec';

  function submitAll() {
    const startDay = 2;
    const dow = dowNames[(startDay + selectedDay - 1) % 7];
    const dateStr = `7월 ${selectedDay}일 (${dow})`;
    const wish    = document.getElementById('wishInput').value.trim() || '(없음)';

    // 구글 시트에 저장
    const params = new URLSearchParams({ '날짜': dateStr, '시간': selectedTime, '하고싶은것': wish });
    fetch(SHEET_URL + '?' + params.toString(), { mode: 'no-cors' });

    // 요약 박스
    document.getElementById('summaryBox').innerHTML =
      `📅 <b>날짜</b> : ${dateStr}<br>` +
      `⏰ <b>시간</b> : ${selectedTime}<br>` +
      `✏️ <b>하고싶은 것</b> : ${wish}`;

    goTo('screen4');
  }
</script>
</body>
</html>
